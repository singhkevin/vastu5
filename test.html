<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Popup Contact Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        label {
            font-weight: 600;
            margin-top: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
        }
        .ast_btn {
            background: #0d6efd;
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
        }
        .ast_btn:hover {
            background: #084298;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2>Welcome to Our Website</h2>
    <p>Stay on the page for 30 seconds to see the contact popup form.</p>
</div>

<!-- Modal -->
<div class="modal fade" id="contactPopup" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Contact Us</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="contactForm" action="save_form.php" method="POST">
                    <div class="row">

                        <div class="col-lg-6 col-md-6 col-sm-12">
                            <label>First Name</label>
                            <input type="text" name="first_name" required>
                        </div>

                        <div class="col-lg-6 col-md-6 col-sm-12">
                            <label>Last Name</label>
                            <input type="text" name="last_name" required>
                        </div>

                        <div class="col-lg-6 col-md-6 col-sm-12">
                            <label>Email</label>
                            <input type="email" name="email" data-valid="email"
                                   data-error="Email should be valid." required>
                        </div>

                        <div class="col-lg-6 col-md-6 col-sm-12">
                            <label>Subject</label>
                            <input type="text" name="subject" required>
                        </div>

                        <div class="col-lg-12">
                            <label>Message</label>
                            <textarea rows="5" name="message" required></textarea>
                        </div>

                        <div class="col-lg-12">
                            <label id="captchaQuestion"></label>
                            <input type="text" id="captchaAnswer" placeholder="Enter answer" required>
                        </div>

                        <div class="response text-danger mt-2"></div>

                        <div class="col-lg-12 text-end mt-3">
                            <button class="ast_btn submitForm" type="submit">
                                Send
                            </button>
                        </div>

                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Show popup after 30 seconds
    setTimeout(function () {
        var popup = new bootstrap.Modal(document.getElementById('contactPopup'));
        popup.show();
    }, 30000);

    // Simple captcha
    let num1 = Math.floor(Math.random() * 10) + 1;
    let num2 = Math.floor(Math.random() * 10) + 1;
    let correctAnswer = num1 + num2;

    document.getElementById("captchaQuestion").innerText =
        "What is " + num1 + " + " + num2 + " ?";

    document.getElementById("contactForm").addEventListener("submit", function (e) {
        let userAnswer = document.getElementById("captchaAnswer").value;
        if (parseInt(userAnswer) !== correctAnswer) {
            e.preventDefault();
            document.querySelector(".response").innerText = "Captcha answer is incorrect.";
        }
    });
</script>

</body>
</html>
